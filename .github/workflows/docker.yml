name: Publish Docker Image
on:
  push:
    branches: [main]
    paths:
      - '**'
      - '!.github/**'
      - '!CHANGELOG.md'
      - '!sub-web/**'
  workflow_dispatch:
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: fireflylzh/subconverter
  GIT_TOKEN: ${{secrets.ACTIONS_TOKEN}}

jobs:
  build:
    name: Build and Push  ${{ matrix.platform }} Docker image to multiple registries
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/386
            os: ubuntu-latest
          - platform: linux/arm/v7
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    outputs:
      ver: ${{ steps.set-ver.outputs.version }}
      sha: ${{ steps.set-ver.outputs.sha_short }}

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      - name: Setup timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: 'Asia/Shanghai'
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get commit SHA
        id: set-ver
        run: |
          echo "version=$(date +%y.%m%d.%H%M-)$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_IMAGE }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=v0.9.0-${{ steps.set-ver.outputs.version }}
      #            type=semver,pattern={{version}}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{env.GIT_TOKEN}}
      - name: Build and push Docker images
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          context: scripts/
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
          #            ${{ env.REGISTRY_IMAGE }}:latest
          #            ghcr.io/lm-firefly/subconverter:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SHA=${{ steps.set-ver.outputs.sha_short }}
            VERSION=${{ steps.set-ver.outputs.version }}
      #          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      #      - name: Generate artifact attestation
      #        uses: actions/attest-build-provenance@v2
      #        with:
      #          subject-name: subconverter
      #          subject-digest: ${{ steps.build.outputs.digest }}
      #          push-to-registry: true
      - name: Export digest
        run: |
          rm -rf /tmp/digests
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

